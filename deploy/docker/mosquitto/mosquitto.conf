# HYDRA-C2 Mosquitto Configuration
# Layer 3: Data Ingestion — MQTT Broker

# Listener for MQTT protocol
listener 1883
protocol mqtt

# Listener for WebSocket (WebTAK integration)
listener 9001
protocol websockets

# Authentication (disable for dev, enable for production)
allow_anonymous true
# password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type all
connection_messages true

# Message size limit (64KB — sufficient for CoT XML)
message_size_limit 65536

# Keep alive
max_keepalive 120
