###############################################################################
# HYDRA-C2 Docker Compose — Local Development & MVP Deployment
# Covers: Layer 3 (MQTT) + Layer 4 (PostGIS + Neo4j) + Layer 6 (Grafana)
###############################################################################
version: "3.9"

services:
  # ===========================================================================
  # Layer 3: Data Ingestion — MQTT Broker (Mosquitto)
  # ===========================================================================
  mqtt:
    image: eclipse-mosquitto:2
    container_name: hydra-mqtt
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================================================
  # Layer 4: Persistence — PostgreSQL + PostGIS
  # ===========================================================================
  postgis:
    image: postgis/postgis:16-3.4
    container_name: hydra-postgis
    environment:
      POSTGRES_DB: hydra_c2
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: ${POSTGIS_PASSWORD:-hydra_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ../../src/hydra_c2/infrastructure/persistence/postgis/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra -d hydra_c2"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================================================
  # Layer 4: Persistence — Neo4j Graph Database
  # ===========================================================================
  neo4j:
    image: neo4j:5-community
    container_name: hydra-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-hydra_graph_2026}
      NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "2g"
      NEO4J_dbms_memory_pagecache_size: "1g"
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-hydra_graph_2026} 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ===========================================================================
  # Layer 6: Visualization — Grafana Dashboard
  # ===========================================================================
  grafana:
    image: grafana/grafana-oss:latest
    container_name: hydra-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-hydra_viz_2026}
      GF_INSTALL_PLUGINS: grafana-worldmap-panel,grafana-clock-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================================================
  # HYDRA-C2 Core API (FastAPI)
  # ===========================================================================
  api:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.api
    container_name: hydra-api
    environment:
      POSTGIS_HOST: postgis
      POSTGIS_PORT: "5432"
      POSTGIS_DATABASE: hydra_c2
      POSTGIS_USER: hydra
      POSTGIS_PASSWORD: ${POSTGIS_PASSWORD:-hydra_dev_2026}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-hydra_graph_2026}
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
    ports:
      - "8000:8000"
    depends_on:
      postgis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      mqtt:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mqtt_data:
  mqtt_log:
  postgis_data:
  neo4j_data:
  neo4j_logs:
  grafana_data:
